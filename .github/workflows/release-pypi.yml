name: Release PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Expected version to publish (must match pyproject.toml / package.json)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Set up Node (required by pyright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Python/npm version coupling
        run: uv run python scripts/check_release_version_match.py

      - name: Validate distribution scope references
        run: uv run python scripts/check_distribution_scope.py

      - name: Validate git tag matches project version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
print(data["project"]["version"])
PY
)"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Validate workflow input version (optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PROJECT_VERSION="$(python - <<'PY'
import tomllib
from pathlib import Path
data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
print(data["project"]["version"])
PY
)"
          if [ "$INPUT_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Input version ($INPUT_VERSION) does not match pyproject version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Run quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright --project pyrightconfig.json
          uv run pytest -q

  build:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
